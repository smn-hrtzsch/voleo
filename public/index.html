<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voleo - WM 2026 Tippspiel</title>
  <style>
    :root {
      --bg: #0b0f19;
      --card-bg: rgba(255, 255, 255, 0.05);
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --text: #ffffff;
      --text-muted: #94a3b8;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, #1e1b4b 0%, var(--bg) 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .container {
      max-width: 500px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }
    h1 {
      font-size: 3rem;
      font-weight: 800;
      margin: 0 0 8px 0;
      background: linear-gradient(135deg, #a5b4fc 0%, #818cf8 50%, #4f46e5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.05em;
    }
    p.subtitle {
      font-size: 1.25rem;
      color: var(--text-muted);
      margin: 0 0 32px 0;
    }
    .app-icon {
      font-size: 4rem;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .info-box {
      margin-bottom: 32px;
      font-size: 1rem;
      line-height: 1.5;
      color: var(--text-muted);
    }
    .btn {
      display: inline-block;
      background: var(--primary);
      color: var(--text);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }
    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-icon">🏆</div>
    <h1>Voleo</h1>
    <p class="subtitle">WM 2026 Tippspiel für Freunde</p>
    <div class="info-box">
      Öffne einen Einladungslink auf deinem Smartphone, um direkt einer Tipprunde beizutreten und mitzutippen!
    </div>
    <a id="app-link" href="voleo://voleo-sho2303.web.app/join/" class="btn">App öffnen</a>
    <script>
      (function() {
        var path = window.location.pathname;
        var link = document.getElementById('app-link');
        if (path && path.startsWith('/join/')) {
          link.href = 'voleo://voleo-sho2303.web.app' + path;
        }
      })();
    </script>
  </div>
</body>
</html>
