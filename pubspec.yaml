name: voleo
description: A modern World Cup 2026 prediction game for friends.
publish_to: "none"
version: 1.2.1+18

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^6.5.0
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0
  firebase_messaging: ^16.0.0
  firebase_storage: ^13.1.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.3.0
  http: ^1.2.2
  image_picker: ^1.2.1
  intl: ^0.20.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0
  font_awesome_flutter: ^11.0.0
  flutter_svg: ^2.3.0
  share_plus: ^13.1.0
  cached_network_image: ^3.4.1
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
