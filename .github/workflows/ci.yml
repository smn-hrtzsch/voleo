name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Detect Flutter-relevant changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - "android/**"
              - "ios/**"
              - "lib/**"
              - "functions/**"
              - "test/**"
              - ".github/workflows/ci.yml"
              - "analysis_options.yaml"
              - "pubspec.yaml"
              - "pubspec.lock"
              - ".github/workflows/release.yml"
      - name: Complete documentation-only check
        if: github.event_name == 'pull_request' && steps.changes.outputs.code != 'true'
        run: echo "No Flutter-relevant changes detected; skipping Flutter setup and tests."
      - name: Restore or Stub firebase_options.dart
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.code == 'true'
        run: |
          if [ -n "${{ secrets.FIREBASE_OPTIONS_DART }}" ]; then
            echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart
          else
            echo "creating dummy firebase_options.dart"
            mkdir -p lib
            echo "import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;" > lib/firebase_options.dart
            echo "class DefaultFirebaseOptions {" >> lib/firebase_options.dart
            echo "  static FirebaseOptions get currentPlatform => const FirebaseOptions(" >> lib/firebase_options.dart
            echo "    apiKey: 'dummy'," >> lib/firebase_options.dart
            echo "    appId: 'dummy'," >> lib/firebase_options.dart
            echo "    messagingSenderId: 'dummy'," >> lib/firebase_options.dart
            echo "    projectId: 'dummy'," >> lib/firebase_options.dart
            echo "  );" >> lib/firebase_options.dart
            echo "}" >> lib/firebase_options.dart
          fi
      - uses: subosito/flutter-action@v2
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.code == 'true'
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.code == 'true'
      - name: Format code
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.code == 'true'
        run: dart format lib/ test/
      - name: Auto-commit formatted code
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.code == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-format Dart code"
      - run: flutter analyze
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.code == 'true'
      - run: flutter test
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.code == 'true'
