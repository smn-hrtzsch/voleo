name: CI

on:
  pull_request:
    paths:
      - "android/**"
      - "ios/**"
      - "lib/**"
      - "test/**"
      - "analysis_options.yaml"
      - "pubspec.yaml"
      - "pubspec.lock"
  workflow_dispatch:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore or Stub firebase_options.dart
        run: |
          if [ -n "${{ secrets.FIREBASE_OPTIONS_DART }}" ]; then
            echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart
          else
            echo "creating dummy firebase_options.dart"
            mkdir -p lib
            cat << 'EOF' > lib/firebase_options.dart
import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
class DefaultFirebaseOptions {
  static FirebaseOptions get currentPlatform => const FirebaseOptions(
    apiKey: 'dummy',
    appId: 'dummy',
    messagingSenderId: 'dummy',
    projectId: 'dummy',
  );
}
EOF
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test
