name: CI

on:
  pull_request:
    paths:
      - "android/**"
      - "ios/**"
      - "lib/**"
      - "test/**"
      - "analysis_options.yaml"
      - "pubspec.yaml"
      - "pubspec.lock"
  workflow_dispatch:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test
