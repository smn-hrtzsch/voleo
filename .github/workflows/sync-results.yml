name: Sync World Cup Results

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without writing to Firebase
        required: false
        default: "true"
  schedule:
    - cron: "*/30 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Sync OpenLigaDB results
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            npm run sync:results -- --dry-run
          else
            npm run sync:results
          fi
