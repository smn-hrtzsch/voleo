name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Type of release"
        required: true
        default: "current"
        type: choice
        options:
          - current
          - patch
          - minor
          - major
      release_title:
        description: "Release Title (optional)"
        required: false
        type: string

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump_version.outputs.new_version }}
      new_version_full: ${{ steps.bump_version.outputs.new_version_full }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Bump Version
        id: bump_version
        run: |
          if [ "${{ inputs.release_type }}" = "current" ]; then
            version_full=$(grep '^version:' pubspec.yaml | awk '{print $2}')
            version="${version_full%%+*}"
            echo "Using current version: ${version_full}"
            echo "new_version=${version}" >> "$GITHUB_OUTPUT"
            echo "new_version_full=${version_full}" >> "$GITHUB_OUTPUT"
          else
            python3 scripts/bump_version.py "${{ inputs.release_type }}"
          fi

      - name: Commit Version Bump & Tag
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          if [ "${{ inputs.release_type }}" != "current" ]; then
            git add pubspec.yaml
            git commit -m "Bump version to ${{ steps.bump_version.outputs.new_version_full }}"
            git push origin main
          fi
          git tag "v${{ steps.bump_version.outputs.new_version }}"
          git push origin "v${{ steps.bump_version.outputs.new_version }}"

  build-android:
    needs: bump-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-version.outputs.new_version }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Restore keystore
        run: |
          echo "${{ secrets.VOLEO_KEYSTORE }}" | base64 --decode > /tmp/voleo.keystore

      - name: Build Android Release APK
        env:
          VOLEO_KEYSTORE_PATH: /tmp/voleo.keystore
          VOLEO_KEY_ALIAS: ${{ secrets.VOLEO_KEY_ALIAS }}
          VOLEO_STORE_PASSWORD: ${{ secrets.VOLEO_STORE_PASSWORD }}
          VOLEO_KEY_PASSWORD: ${{ secrets.VOLEO_KEY_PASSWORD }}
        run: |
          flutter build apk --release

      - name: Rename APK
        run: |
          mkdir dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/Voleo-android-v${{ needs.bump-version.outputs.new_version }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/Voleo-android-v${{ needs.bump-version.outputs.new_version }}.apk

  publish-release:
    needs: [bump-version, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.bump-version.outputs.new_version }}
          name: ${{ inputs.release_title != '' && inputs.release_title || format('Release v{0}', needs.bump-version.outputs.new_version) }}
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
