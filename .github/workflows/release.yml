name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Type of release"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      release_title:
        description: "Release Title (optional)"
        required: false
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: manual-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump_version.outputs.new_version }}
      new_version_full: ${{ steps.bump_version.outputs.new_version_full }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Bump version
        id: bump_version
        run: python3 scripts/bump_version.py "${{ inputs.release_type }}"

      - name: Create release pull request
        id: release_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ steps.bump_version.outputs.new_version }}"
          version_full="${{ steps.bump_version.outputs.new_version_full }}"
          branch="release/v${version}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${version_full}"
          git push origin "$branch"

          pr_url=$(gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: bump version to ${version_full}" \
            --body "Automated release version bump for v${version}.")

          echo "branch=${branch}" >> "$GITHUB_OUTPUT"
          echo "pr_url=${pr_url}" >> "$GITHUB_OUTPUT"

      - name: Run CI for release pull request
        id: release_ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr checks "${{ steps.release_pr.outputs.pr_url }}" --watch --required

      - name: Merge release pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr_url="${{ steps.release_pr.outputs.pr_url }}"

          gh pr merge "$pr_url" --squash --delete-branch --auto

          for i in {1..60}; do
            state=$(gh pr view "$pr_url" --json state --jq .state)
            if [ "$state" = "MERGED" ]; then
              break
            fi
            if [ "$state" = "CLOSED" ]; then
              echo "Release pull request was closed before it was merged."
              exit 1
            fi
            sleep 10
          done

          state=$(gh pr view "$pr_url" --json state --jq .state)
          if [ "$state" != "MERGED" ]; then
            echo "Release pull request did not merge before the timeout."
            exit 1
          fi

          git fetch origin main --tags
          git checkout main
          git reset --hard origin/main

      - name: Tag release
        run: |
          set -euo pipefail
          version="${{ steps.bump_version.outputs.new_version }}"
          git tag "v${version}"
          git push origin "v${version}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Restore keystore
        run: echo "${{ secrets.VOLEO_KEYSTORE }}" | base64 --decode > /tmp/voleo.keystore

      - name: Build Android Release APK
        env:
          VOLEO_KEYSTORE_PATH: /tmp/voleo.keystore
          VOLEO_KEY_ALIAS: ${{ secrets.VOLEO_KEY_ALIAS }}
          VOLEO_STORE_PASSWORD: ${{ secrets.VOLEO_STORE_PASSWORD }}
          VOLEO_KEY_PASSWORD: ${{ secrets.VOLEO_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/Voleo-android-v${{ steps.bump_version.outputs.new_version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.bump_version.outputs.new_version }}
          name: ${{ inputs.release_title != '' && inputs.release_title || format('Release v{0}', steps.bump_version.outputs.new_version) }}
          files: dist/Voleo-android-v${{ steps.bump_version.outputs.new_version }}.apk
          generate_release_notes: true
          draft: false
          prerelease: false
